name: static-checks

on:
  push:
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - run: Rscript -e 'install.packages(c("dplyr","ggplot2","mclust","randomForest","readr","tidyr"), repos="https://cloud.r-project.org")'
      - run: Rscript scripts/make_sample_data.R
      - run: Rscript scripts/run_analysis.R --input data/sample_panel.csv --output outputs/ci_run --ntree 25
